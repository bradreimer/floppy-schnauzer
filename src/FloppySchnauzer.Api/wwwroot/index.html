<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Floppy Schnauzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        touch-action: none;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #overlay {
        position: fixed;
        top: 10px;
        left: 10px;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 18px;
        text-shadow: 0 0 4px #000;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="overlay">Tap to start</div>
    <canvas id="game"></canvas>
    <script type="module" src="floppy-schnauzer.js"></script>
  </body>
</html>
